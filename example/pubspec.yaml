name: mysql_native_connector_example
description: "Demonstrates how to use the mysql_native_connector plugin."
publish_to: 'none'

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  mysql_native_connector:
    path: ../
  cupertino_icons: ^1.0.8
  path: ^1.9.1
  shimmer: ^3.0.0
  provider: ^6.1.5+1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  # Generator Eloquent — habilite quando `dart pub get` no pacote generator resolver.
  # mysql_native_connector_generator:
  #   path: ../mysql_native_connector_generator

flutter:
  uses-material-design: true
  assets:
    - assets/geral.ini.example
